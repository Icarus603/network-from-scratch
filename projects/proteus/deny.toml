# cargo-deny configuration for production hardening.
# Run `cargo deny check` to verify dependencies against:
#   - RustSec advisories
#   - allowed-license list
#   - banned crates / duplicate versions
#   - unknown / git-only registries

[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"
# Ignore advisories explicitly here; an empty list means we treat every
# unfixed advisory as a build break.
ignore = []

[licenses]
version = 2
# Allow common permissive licenses we vet for production redistribution.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    # webpki-roots ships under CDLA-Permissive-2.0 (data license for
    # CA trust anchors). Vetted as production-safe.
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
# Tag our own crates as Apache-2.0 OR MIT in their Cargo.toml; nothing
# under the workspace should require a copyleft license.
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Path-style deps within the workspace are wildcards by design; ignore.
allow-wildcard-paths = true
highlight = "all"
# Crates we explicitly never want pulled in.
deny = [
    # `openssl-sys` brings native OpenSSL which complicates Docker builds;
    # we use rustls + ring instead.
    { name = "openssl-sys" },
    # Old TLS implementations.
    { name = "native-tls" },
]
# Pre-existing duplicate-version exceptions (transitive only).
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
