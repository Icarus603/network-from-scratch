# Proteus client config example.
# Copy to /etc/proteus/client.yaml or run with `--config ./client.yaml`.
#
# Supports dual-stack carriers:
#   - α (TCP + TLS 1.3): always available as fallback.
#   - β (QUIC over UDP): optional, much faster on lossy paths.
# When both are configured the client uses happy-eyeballs: tries β
# first with a short timeout, falls back to α on any β failure.

# Remote Proteus server `host:port` for the α (TCP+TLS) carrier.
# REQUIRED — this is the always-available fallback path.
server_endpoint: "vps.example.com:8443"

# Optional β (QUIC over UDP) endpoint on the same server. When set,
# the client tries β first; on any β failure (timeout, UDP blocked,
# cert mismatch, peer doesn't support DATAGRAM) it falls back to α.
# Strongly recommended in production — β with BBR + zero-HoL
# DATAGRAM beats α handily on lossy long-fat-pipe paths.
#
# Typical deployment: server binds α to :443/tcp and β to :443/udp
# on the same host, so this client config has identical strings
# for both endpoints.
# server_endpoint_beta: "vps.example.com:8443"

# Optional override for β's TLS SNI. Defaults to `tls.server_name`
# below (the common case: same Let's Encrypt cert for both carriers).
# Only set this when the operator has split cert/SNI per carrier.
# beta_server_name: "vps.example.com"

# Per-connection timeout (seconds) for the β-first dial attempt
# before falling back to α. Default 3s. Tune up for high-RTT paths
# (transcontinental: 5s), down for LAN-only deployments (1s).
# beta_first_timeout_secs: 3

# Local SOCKS5 inbound. Point your browser / curl / sing-box at this.
socks_listen: "127.0.0.1:1080"

# Your user ID — must match an entry in the server's `client_allowlist`.
user_id: "alice001"

# Keys distributed by the server admin.
keys:
  server_mlkem_pk: ./keys/server_lt.mlkem768.pk
  server_x25519_pk: ./keys/server_lt.x25519.pk
  server_pq_fingerprint: ./keys/server_lt.pq.fingerprint
  client_ed25519_sk: ./keys/client/client.ed25519.sk

# Outer TLS 1.3 wrapper (must match server's `tls:` block).
# - `server_name` is the SAN on the server's certificate.
# - `trusted_ca` is optional: only set it when the server uses a
#   self-signed cert. Production with Let's Encrypt: leave commented out
#   and the client trusts webpki-roots automatically.
tls:
  server_name: vps.example.com
  # trusted_ca: ./keys/tls/self-signed-ca.pem

# Server-advertised anti-DoS difficulty (must match server's setting).
# When the server raises this, update the client config too; mismatched
# values lead to handshake reject (silent route to cover).
pow_difficulty: 0

# Data-plane padding quantum (bytes) for the client→server direction.
# When non-zero, every outgoing AEAD record is length-prefixed and
# zero-padded to a multiple of this value before encryption, so a
# passive observer measuring upload record lengths learns only "which
# quantum bucket" (spec §4.6 / §22). Independent of the server's
# `pad_quantum` knob.
#
# Recommended values:
#   - 0 / unset: no padding, max throughput, wire lengths leak
#   - 64: ~1% overhead at 16 KiB, kills sub-64-byte signal
#   - 1280: matches β cell size, full sub-cell hiding (~5% overhead)
#
# For true traffic-analysis resistance set BOTH client and server
# `pad_quantum` (otherwise one direction stays unpadded).
# pad_quantum: 64
