# Proteus α-profile server config example.
# Copy to /etc/proteus/server.yaml and edit.

# TCP listen address. For production, bind to :443 and run as a user with
# CAP_NET_BIND_SERVICE (see systemd unit).
listen_alpha: "0.0.0.0:8443"

# Prometheus exposition + container health probes (optional). The
# same listener serves three routes:
#   GET /metrics — Prometheus 0.0.4 text exposition.
#   GET /healthz — Kubernetes liveness probe (200 alive, 503 dead).
#   GET /readyz  — Kubernetes readiness probe (200 ready, 503 draining).
# On SIGTERM, /readyz immediately flips to 503 so the load balancer
# drains us before the drain_secs window expires.
# Loopback (127.0.0.1) is safe without auth. For any other interface,
# configure `metrics_token_file` below — otherwise the binary warns
# loudly at startup that /metrics is world-readable.
metrics_listen: "127.0.0.1:9090"

# Optional bearer-token gate for /metrics. The file's first line is
# the secret (trailing whitespace stripped). /healthz and /readyz are
# never gated. Generate a fresh 32-byte token:
#   openssl rand -hex 32 > /etc/proteus/metrics.token
#   chmod 0600 /etc/proteus/metrics.token
#   chown proteus:proteus /etc/proteus/metrics.token
# Then Prometheus scrape config:
#   - job_name: proteus
#     bearer_token_file: /etc/prometheus/proteus-metrics.token
#     static_configs:
#       - targets: ['proteus.internal:9090']
# Comment out to disable auth (only safe on loopback).
# metrics_token_file: /etc/proteus/metrics.token

# Source-IP firewall (CIDR allow/deny). Evaluated BEFORE rate-limit
# and max_connections. Denied connections are byte-spliced to the cover
# endpoint so an attacker cannot distinguish "you're blocked" from a
# generic HTTPS proxy. Order: deny wins over allow. Empty allowlist =
# "no allowlist policy" (admit unless denied).
# firewall:
#   allow:
#     - 10.0.0.0/8           # company VPN
#     - 198.51.100.0/24      # operator office
#   deny:
#     - 192.0.2.42/32        # banned client
#     - 2001:db8:bad::/48    # known abusive netblock

# Global hard cap on simultaneous accepted connections (OOM defense).
# Each in-flight Proteus handshake reserves ~16 KiB plus ML-KEM scratch
# (~4 KiB temp). At 4096, peak transient memory ≈ 80 MiB worst-case —
# safe on a 1 GiB VPS. Tune toward `min(nofile_ulimit / 4, RAM_MB)`.
# Connections beyond this cap are byte-spliced to cover_endpoint so an
# attacker can't distinguish a saturated server from a generic HTTPS
# proxy. Unset = unlimited (NOT recommended for production).
max_connections: 4096

# Global handshake budget (single shared bucket). Caps **total**
# handshakes/sec across every source. Defends against fleet-wide
# flooding where every individual IP stays under its per-IP limit
# (rate_limit) but the aggregate ML-KEM CPU cost crushes the server.
# Sensible production sizing: burst = your ML-KEM-decap throughput in
# handshakes/sec (≈ 10 k for a single dedicated core), refill = the
# rate you can sustain forever. Connections beyond this cap route to
# cover so attackers can't distinguish "server overloaded" from a
# generic HTTPS proxy. Unset = no global cap.
# handshake_budget:
#   burst: 1000.0
#   refill_per_sec: 200.0

# Per-user rate limit (CGNAT-fair). Each authenticated user_id gets
# its own token bucket layered on top of the per-IP rate limit. With
# this, multiple users behind one NAT each get their own budget.
# Sessions over the per-user limit are torn down before the relay
# fires — handshake completed, but `handle_session()` never runs.
# `max_users` caps memory (one bucket ≈ 64 B). Unset = no per-user cap.
# user_rate_limit:
#   burst: 10.0
#   refill_per_sec: 1.0
#   max_users: 65536

# Per-source-IP token-bucket rate limit. Burst = max handshakes that may
# arrive instantaneously from one IP; refill = steady-state rate. With
# the defaults below a single client gets 10 burst handshakes, then 5/s
# steady. Excess connections are routed to the cover endpoint so the
# attacker cannot distinguish "rate-limited" from a generic HTTPS proxy.
rate_limit:
  burst: 10.0
  refill_per_sec: 5.0

# Per-handshake wall-clock deadline (slowloris defense). Default 15s.
handshake_deadline_secs: 15

# Structured access log (JSON Lines). One record per completed session.
# Schema: {ts, user_id, peer, duration_ms, tx_bytes, rx_bytes, close_reason}
# Ship to Loki / CloudWatch / OpenSearch / Datadog without further parsing.
# Rotate externally via logrotate. The writer keeps its FD open across
# the rotation, so the rotation hook MUST send SIGUSR1 after rename:
#   postrotate
#       systemctl kill --signal=USR1 proteus-server
#   endscript
# (`copytruncate` also works without SIGUSR1.) Unset = disabled.
# access_log: /var/log/proteus/access.log

# Outbound destination filter (SSRF defense). PRODUCTION REQUIRED
# unless you're running on an isolated test bench.
# Without this filter, any authenticated client can ask the server
# to dial cloud metadata endpoints (169.254.169.254), RFC 1918
# internal networks, loopback services, or IPv6 ULA. Standard
# stolen-credential exploitation pattern. The default policy blocks
# every standard SSRF range AND restricts dial ports to {80, 443}.
#
# Default (no `outbound_filter:` block) is the production-safe
# policy. To extend without weakening the defaults:
#   outbound_filter:
#     extra_ports: [587, 993, 853]    # SMTP submission, IMAPS, DoT
#     extra_blocked_cidrs:
#       - 100.64.0.0/10                # block your own CGNAT
#     blocked_hostnames:
#       - "*.badcdn.example"           # known-abuse hostnames
#     allowed_hostnames:               # when non-empty, ONLY these
#       - "*.cdn.example.net"          # match (apex and subdomains).
#       - "api.example.com"            # `*.foo` = strict subdomains;
#                                      # `foo` = apex + subdomains.
# To explicitly DISABLE the filter (testing / trusted LAN only):
#   outbound_filter:
#     disabled: true
# To completely replace the SSRF default blocklist (advanced):
#   outbound_filter:
#     replace_default_blocklist: true
#     extra_blocked_cidrs: [...]

# Per-user anomaly detectors. Sliding-window counters over abnormal
# events. Each fires WARN + bumps a counter once-per-burst; resets
# after the window goes empty so a later burst re-alerts.
#   byte_budget — same user_id trips max_session_bytes cap repeatedly.
#                 Signal: stolen credential being used to exfiltrate.
#   rate_limit  — same user_id repeatedly rejected by user_rate_limit.
#                 Signal: misconfigured client, or bots sharing one
#                 credential / brute-forcing.
# Sensible production value: threshold=3 over a 300s window.
# abuse_detector:
#   byte_budget:
#     window_secs: 300
#     threshold: 3
#   rate_limit:
#     window_secs: 300
#     threshold: 3

# Per-session byte budget (tx + rx plaintext). Sessions whose total
# bytes crosses this threshold are torn down with close_reason
# "byte_budget_exhausted". Defends against a compromised credential
# or one greedy user saturating upstream egress and starving other
# sessions sharing the NIC. Recommended: ~50 GiB for streaming-heavy
# users (53687091200). Unset = no cap.
# max_session_bytes: 53687091200

# Per-session idle timeout in seconds. A session that goes this long
# without any inner record (either direction) is closed and its FD
# released. Distinct from handshake_deadline_secs which only bounds
# setup. Default 600s (10 min); set to 0 to disable.
# Tune relative to the longest legitimate idle period your clients
# expect — too aggressive churns long-poll HTTP / WebSocket / SSH;
# too loose lets a malicious idle holder eat FDs.
session_idle_secs: 600

# TCP keepalive interval (idle-session reaper). Default 30s.
tcp_keepalive_secs: 30

# SIGTERM/SIGINT drain window. After the signal the server stops
# accepting new connections and waits this long for in-flight sessions
# to flush before exiting. Match `TimeoutStopSec` in the systemd unit
# (set to drain_secs + 5s for a safety margin). Default 30s.
drain_secs: 30

# Anti-DoS proof-of-work (spec §8.3). Difficulty in leading-zero bits
# of SHA-256(server_pq_fingerprint || client_nonce || solution). 0 =
# disabled. Sensible production values:
#   - 0   (normal operations)
#   - 8   (under modest DoS — ~256 hashes per client)
#   - 16  (under heavy DoS — ~65k hashes per client, sub-second on phone)
#   - 24  (under sustained DoS — ~16M hashes, ~1s on a laptop)
# Bump on alert; restore to 0 when traffic normalizes. Mismatched
# difficulty between client and server routes to cover.
pow_difficulty: 0

# Outer TLS 1.3 wrapper (spec §4.2). PRODUCTION REQUIRED — without this
# block the server runs plain TCP and passive DPI immediately identifies
# the protocol. Point `cert_chain` at a real Let's Encrypt full-chain
# PEM and `private_key` at the matching PKCS8 private key.
# After renewal, send SIGHUP (e.g. `systemctl kill --signal=HUP proteus-server`)
# to hot-swap the cert — in-flight sessions are unaffected.
tls:
  cert_chain: /etc/proteus/keys/tls/fullchain.pem
  private_key: /etc/proteus/keys/tls/privkey.pem

# Cover endpoint for auth-fail forwarding (spec §7.5). The server pipes
# byte-verbatim to this endpoint on any handshake failure, making the
# server indistinguishable from a generic HTTPS proxy fronting this
# upstream. Use a real, popular HTTPS site to maximize cover.
cover_endpoint: "www.cloudflare.com:443"

# Server long-term keys (generated via `proteus-server keygen`).
keys:
  mlkem_pk: /etc/proteus/keys/server_lt.mlkem768.pk
  mlkem_sk: /etc/proteus/keys/server_lt.mlkem768.sk
  x25519_pk: /etc/proteus/keys/server_lt.x25519.pk
  x25519_sk: /etc/proteus/keys/server_lt.x25519.sk

# Authorized clients. The server only accepts handshakes from clients
# whose Ed25519 verifying key appears here. If the list is empty, the
# server accepts any client (NOT recommended for production).
client_allowlist:
  - user_id: "alice001"
    ed25519_pk: /etc/proteus/keys/clients/alice.ed25519.pk
  - user_id: "bob00001"
    ed25519_pk: /etc/proteus/keys/clients/bob.ed25519.pk
