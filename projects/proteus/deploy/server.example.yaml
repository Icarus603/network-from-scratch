# Proteus α-profile server config example.
# Copy to /etc/proteus/server.yaml and edit.

# TCP listen address. For production, bind to :443 and run as a user with
# CAP_NET_BIND_SERVICE (see systemd unit).
listen_alpha: "0.0.0.0:8443"

# Prometheus exposition + container health probes (optional). Bind to a
# private address; the endpoint has no authentication. Comment out to
# disable. The same listener serves three routes:
#   GET /metrics — Prometheus 0.0.4 text exposition.
#   GET /healthz — Kubernetes liveness probe (200 alive, 503 dead).
#   GET /readyz  — Kubernetes readiness probe (200 ready, 503 draining).
# On SIGTERM, /readyz immediately flips to 503 so the load balancer
# drains us before the drain_secs window expires.
metrics_listen: "127.0.0.1:9090"

# Source-IP firewall (CIDR allow/deny). Evaluated BEFORE rate-limit
# and max_connections. Denied connections are byte-spliced to the cover
# endpoint so an attacker cannot distinguish "you're blocked" from a
# generic HTTPS proxy. Order: deny wins over allow. Empty allowlist =
# "no allowlist policy" (admit unless denied).
# firewall:
#   allow:
#     - 10.0.0.0/8           # company VPN
#     - 198.51.100.0/24      # operator office
#   deny:
#     - 192.0.2.42/32        # banned client
#     - 2001:db8:bad::/48    # known abusive netblock

# Global hard cap on simultaneous accepted connections (OOM defense).
# Each in-flight Proteus handshake reserves ~16 KiB plus ML-KEM scratch
# (~4 KiB temp). At 4096, peak transient memory ≈ 80 MiB worst-case —
# safe on a 1 GiB VPS. Tune toward `min(nofile_ulimit / 4, RAM_MB)`.
# Connections beyond this cap are byte-spliced to cover_endpoint so an
# attacker can't distinguish a saturated server from a generic HTTPS
# proxy. Unset = unlimited (NOT recommended for production).
max_connections: 4096

# Per-source-IP token-bucket rate limit. Burst = max handshakes that may
# arrive instantaneously from one IP; refill = steady-state rate. With
# the defaults below a single client gets 10 burst handshakes, then 5/s
# steady. Excess connections are routed to the cover endpoint so the
# attacker cannot distinguish "rate-limited" from a generic HTTPS proxy.
rate_limit:
  burst: 10.0
  refill_per_sec: 5.0

# Per-handshake wall-clock deadline (slowloris defense). Default 15s.
handshake_deadline_secs: 15

# TCP keepalive interval (idle-session reaper). Default 30s.
tcp_keepalive_secs: 30

# SIGTERM/SIGINT drain window. After the signal the server stops
# accepting new connections and waits this long for in-flight sessions
# to flush before exiting. Match `TimeoutStopSec` in the systemd unit
# (set to drain_secs + 5s for a safety margin). Default 30s.
drain_secs: 30

# Anti-DoS proof-of-work (spec §8.3). Difficulty in leading-zero bits
# of SHA-256(server_pq_fingerprint || client_nonce || solution). 0 =
# disabled. Sensible production values:
#   - 0   (normal operations)
#   - 8   (under modest DoS — ~256 hashes per client)
#   - 16  (under heavy DoS — ~65k hashes per client, sub-second on phone)
#   - 24  (under sustained DoS — ~16M hashes, ~1s on a laptop)
# Bump on alert; restore to 0 when traffic normalizes. Mismatched
# difficulty between client and server routes to cover.
pow_difficulty: 0

# Outer TLS 1.3 wrapper (spec §4.2). PRODUCTION REQUIRED — without this
# block the server runs plain TCP and passive DPI immediately identifies
# the protocol. Point `cert_chain` at a real Let's Encrypt full-chain
# PEM and `private_key` at the matching PKCS8 private key.
# After renewal, send SIGHUP (e.g. `systemctl kill --signal=HUP proteus-server`)
# to hot-swap the cert — in-flight sessions are unaffected.
tls:
  cert_chain: /etc/proteus/keys/tls/fullchain.pem
  private_key: /etc/proteus/keys/tls/privkey.pem

# Cover endpoint for auth-fail forwarding (spec §7.5). The server pipes
# byte-verbatim to this endpoint on any handshake failure, making the
# server indistinguishable from a generic HTTPS proxy fronting this
# upstream. Use a real, popular HTTPS site to maximize cover.
cover_endpoint: "www.cloudflare.com:443"

# Server long-term keys (generated via `proteus-server keygen`).
keys:
  mlkem_pk: /etc/proteus/keys/server_lt.mlkem768.pk
  mlkem_sk: /etc/proteus/keys/server_lt.mlkem768.sk
  x25519_pk: /etc/proteus/keys/server_lt.x25519.pk
  x25519_sk: /etc/proteus/keys/server_lt.x25519.sk

# Authorized clients. The server only accepts handshakes from clients
# whose Ed25519 verifying key appears here. If the list is empty, the
# server accepts any client (NOT recommended for production).
client_allowlist:
  - user_id: "alice001"
    ed25519_pk: /etc/proteus/keys/clients/alice.ed25519.pk
  - user_id: "bob00001"
    ed25519_pk: /etc/proteus/keys/clients/bob.ed25519.pk
