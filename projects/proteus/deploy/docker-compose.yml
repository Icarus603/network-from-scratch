services:
  proteus-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: server
    image: proteus/server:0.1.0
    container_name: proteus-server
    restart: unless-stopped
    network_mode: host  # use host networking so cover-forward p99 stays low
    volumes:
      - ./server.yaml:/etc/proteus/server.yaml:ro
      - ./keys:/etc/proteus/keys:ro
      - proteus_logs:/var/log/proteus
    environment:
      RUST_LOG: "proteus_server=info,proteus_transport_alpha=info"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    # Container liveness + readiness probe. /healthz returns 200 once
    # the listener is bound; /readyz returns 200 while accepting traffic
    # and flips to 503 the instant SIGTERM is received, so an upstream
    # load balancer drains us before docker stops the container. Set
    # `metrics_listen: 127.0.0.1:9090` in server.yaml (default in the
    # bundled example) for this to work.
    healthcheck:
      test: ["CMD", "/usr/local/bin/proteus-server-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    # Match server.yaml `drain_secs` (default 30s) + 5s margin so docker
    # gives the server time to flush in-flight sessions cleanly.
    stop_grace_period: 35s

volumes:
  proteus_logs:
